# golangci-lint configuration.
#
# Conservative set — catches real bugs without shouting about style.
# We can always tighten later.

run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - govet         # includes shadow, printf, structtag, etc.
    - ineffassign   # assignments whose value is never used
    - staticcheck   # the big one; broad correctness checks
    - gosimple      # obvious simplifications
    - gofmt         # formatting
    - misspell      # typos in comments and strings

  # errcheck was flagging ~30 idiomatic cleanup calls like
  # defer conn.Close() / client.Quit() / d.Unmount() / fmt.Sscanf on
  # opportunistic parses — all standard Go patterns where the error
  # is intentionally unchecked. Rather than spray `_ =` everywhere,
  # we rely on staticcheck (SA5001 etc.) to catch genuinely-suspicious
  # ignores while accepting the rest.
  #
  # unused was flagging helpers (nameFromPath in ftp/sftp) that are
  # referenced transitively or kept for future use. Not worth hunting.

issues:
  exclude-rules:
    # cgo //export functions legitimately live in package main and don't
    # need individual godoc comments above each one.
    - path: "cmd/.+/main.go"
      text: "should have( a package)? comment"
      linters: [revive, golint]
