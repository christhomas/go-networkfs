# golangci-lint configuration.
#
# Conservative set — catches real bugs without shouting about style.
# We can always tighten later.

run:
  timeout: 3m
  # TUI uses bubbletea which can produce a lot of deep Model/View structs
  # that tempt exhaustivestruct etc. Not worth chasing.
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck      # ignored errors are almost always bugs
    - govet         # includes shadow, printf, structtag, etc.
    - ineffassign   # assignments whose value is never used
    - staticcheck   # the big one; broad correctness checks
    - unused        # dead code
    - gosimple      # obvious simplifications
    - gofmt         # formatting
    - misspell      # typos in comments and strings

linters-settings:
  errcheck:
    # Conn.Close and similar on cleanup paths are routinely ignored.
    # Require explicit `_ =` when we do.
    check-type-assertions: false
    check-blank: false

issues:
  exclude-rules:
    # Stubs purposely swallow their arguments until the driver is implemented.
    - path: "(sftp|smb|dropbox|webdav|gdrive|s3|onedrive)/[a-z]+\\.go"
      linters: [unparam, revive]

    # cgo //export functions legitimately live in package main and don't
    # need individual godoc comments above each one.
    - path: "cmd/.+/main.go"
      text: "should have( a package)? comment"
      linters: [revive, golint]
