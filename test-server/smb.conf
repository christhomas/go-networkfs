[global]
workgroup = WORKGROUP
server string = DiskJockey Test
security = user
map to guest = never
log level = 1

# __TEST_USER__ is substituted at build time from the TEST_USER build
# arg in the Dockerfile — do not hard-code a user here.
[testshare]
path = /data/smb
browseable = yes
writable = yes
valid users = __TEST_USER__
