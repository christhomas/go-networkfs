# TUI account presets for the docker-compose test-server in this
# directory. Pass one to the TUI with:
#
#     ../build/networkfs --account docker-ftp
#
# Values match the docker-compose port mappings and the default
# TEST_USER / TEST_PASSWORD build args. Override those in compose to
# change what goes on the wire — the server user and these presets
# must stay in sync.
#
# Dropbox is omitted because it can't be self-hosted.

accounts:
  docker-ftp:
    type: ftp
    host: localhost
    port: "2121"
    user: testuser
    pass: testpass
    root: /

  docker-sftp:
    type: sftp
    host: localhost
    port: "2223"
    user: testuser
    pass: testpass
    root: /data/sftp
    insecure_host_key: "true"

  docker-webdav:
    type: webdav
    url: http://localhost:8080
    user: testuser
    pass: testpass

  docker-smb:
    type: smb
    host: localhost
    port: "4450"
    share: testshare
    user: testuser
    pass: testpass
