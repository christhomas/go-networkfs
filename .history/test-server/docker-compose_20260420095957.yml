services:
  test-server:
    build: ./test-server
    ports:
      - "2223:22"       # SFTP
      - "2121:21"       # FTP
      - "21000-21010:21000-21010"  # FTP passive
      - "8080:8080"     # WebDAV
      - "4450:445"      # SMB (4450 to avoid conflict with host)
    volumes:
      - ./test-mount/data:/data
